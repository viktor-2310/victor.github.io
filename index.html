<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.css" rel="stylesheet">
    <title>Ayres Móvil</title>
    <style>
        body {
            background-color: #111827; /* Dark background */
        }
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header class="text-center p-10">
        <h1 class="text-5xl font-bold text-white" data-aos="fade-up">MOVAMOS EL BARRIO</h1>
    </header>

    <main class="container mx-auto p-5">
        <section class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="glass p-5" data-aos="fade-up" data-aos-delay="100">
                <h2 class="text-2xl font-bold">Tarifa Normal</h2>
                <p>$1.300</p>
            </div>
            <div class="glass p-5" data-aos="fade-up" data-aos-delay="200">
                <h2 class="text-2xl font-bold">Tarifa Premium</h2>
                <p>$2.500</p>
            </div>
            <div class="glass p-5" data-aos="fade-up" data-aos-delay="300">
                <h2 class="text-2xl font-bold">Suscripciones Escolares</h2>
                <p>Consulta por precios</p>
            </div>
        </section>

        <section class="mt-10 text-white" data-aos="fade-up">
            <h2 class="text-3xl font-bold">Chevrolet Corsa</h2>
            <ul>
                <li>VTV: Actual</li>
                <li>Seguro: Vigente</li>
                <li>Licencia: C1</li>
                <li>Pet Friendly: Sí</li>
            </ul>
        </section>

        <div class="fixed bottom-10 right-10">
            <a href="https://wa.me/your-number" class="bg-green-500 text-white font-bold py-3 px-6 rounded-full shadow-lg">
                Pedir Viaje
            </a>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
